name: Build Windows .exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: PyInstaller build (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install markitdown + extras + PyInstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/markitdown[all]"
          python -m pip install pyinstaller==6.11.1

      - name: Build single-file executable
        shell: bash
        working-directory: packaging
        run: |
          pyinstaller --clean --noconfirm markitdown.spec

      - name: Smoke-test the binary
        shell: bash
        run: |
          ./packaging/dist/markitdown.exe --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: markitdown-windows-x64
          path: packaging/dist/markitdown.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/markitdown.exe
