name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        working-directory: packages/markitdown
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: packages/markitdown/dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Uses PyPI Trusted Publishing — no API token required if a publisher
    # for this repo + workflow is configured at https://pypi.org/manage/account/publishing/
    environment:
      name: pypi
      url: https://pypi.org/p/markitdown-postproc
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
