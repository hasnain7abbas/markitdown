name: Build Tauri desktop installers

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build-desktop.yml"
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-targets: ""
            bundle-target: ""
          - platform: macos-latest
            # `universal-apple-darwin` is not a real rustup target — it is a
            # tauri-cli wrapper that lipo-merges the two real targets below.
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            bundle-target: "universal-apple-darwin"
          - platform: ubuntu-22.04
            rust-targets: ""
            bundle-target: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.toml') }}

      - name: Install JS deps
        working-directory: app
        run: npm install

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "markitdown ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.bundle-target && format('--target {0}', matrix.bundle-target) || '' }}
